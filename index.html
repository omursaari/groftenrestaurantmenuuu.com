<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Groften Dijital Menü</title>
  <link rel="stylesheet" href="groften.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet">
  
  <link href="https://fonts.googleapis.com/css2?family=Fugaz+One&family=Playfair+Display:wght@700;900&family=Raleway:wght@400;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  
 <header style="background-color: rgb(110, 7, 7);" class="header">
  <div class="brand-wrapper">
    <div class="crown-container">
      <i class="fas fa-crown crown-icon"></i>
      <div class="crown-glow"></div>
    </div>
    <!-- Yeni Başlık Yapısı -->
    <h1  class="restaurant-title">GRØFTEN</h1>
    <div class="sub-title">RESTAURANT CAFE & BAR</div>
  </div>
  
  <div class="language-selector">
    <div class="language-dropdown custom" id="language-dropdown">
      <button type="button" class="language-selected" id="language-selected" aria-haspopup="listbox" aria-expanded="false">
        <img class="flag-img selected-flag" src="https://flagcdn.com/w20/tr.png" alt="Türkçe">
        <span class="selected-language">Türkçe</span>
        <span class="dropdown-arrow">▾</span>
      </button>
      <ul class="language-options" id="language-options" role="listbox" tabindex="-1">
        <li class="language-option active" data-lang="tr" data-label="Türkçe" role="option">
          <img class="flag-img" src="https://flagcdn.com/w20/tr.png" alt="">
          Türkçe
        </li>
        <li class="language-option" data-lang="en" data-label="English" role="option">
          <img class="flag-img" src="https://flagcdn.com/w20/gb.png" alt="">
          English
        </li>
        <li class="language-option" data-lang="ru" data-label="Русский" role="option">
          <img class="flag-img" src="https://flagcdn.com/w20/ru.png" alt="">
          Русский
        </li>
        <li class="language-option" data-lang="dk" data-label="Dansk" role="option">
          <img class="flag-img" src="https://flagcdn.com/w20/dk.png" alt="">
          Dansk
        </li>
        <li class="language-option" data-lang="fi" data-label="Suomi" role="option">
          <img class="flag-img" src="https://flagcdn.com/w20/fi.png" alt="">
          Suomi
        </li>
        <li class="language-option" data-lang="se" data-label="Svenska" role="option">
          <img class="flag-img" src="https://flagcdn.com/w20/se.png" alt="">
          Svenska
        </li>
        <li class="language-option" data-lang="no" data-label="Norsk" role="option">
          <img class="flag-img" src="https://flagcdn.com/w20/no.png" alt="">
          Norsk
        </li>
        <li class="language-option" data-lang="nl" data-label="Nederlands" role="option">
          <img class="flag-img" src="https://flagcdn.com/w20/nl.png" alt="">
          Nederlands
        </li>
        <li class="language-option" data-lang="de" data-label="Deutsch" role="option">
          <img class="flag-img" src="https://flagcdn.com/w20/de.png" alt="">
          Deutsch
        </li>
      </ul>
    </div>
  </div>
</header>

  <main class="menu-container">
    <section style="background-color: rgba(160, 178, 190, 0.13);"class="welcome-section">
      <h2 style="font-size: 33px;" data-tr="Hoş Geldiniz" data-en="Welcome" data-ru="Добро пожаловать" data-dk="Velkommen" data-fi="Tervetuloa" data-se="Välkommen" data-no="Velkommen" data-nl="Welkom" data-de="Willkommen">Hoş Geldiniz</h2>
      <p style="font-size: 17px;"  data-tr="Groften'in eşsiz lezzetlerini keşfedin." data-en="Discover the unique tastes of Groften." data-ru="Откройте для себя уникальные вкусы Groften." data-dk="Opdag Groftens unikke smage." data-fi="Tutustu Groftens ainutlaatuisiin makuihin." data-se="Upptäck Groftens unika smaker." data-no="Oppdag Groftens unike smaker." data-nl="Ontdek de unieke smaken van Groften." data-de="Entdecken Sie die einzigartigen Geschmäcker von Groften.">Groften'in eşsiz lezzetlerini keşfedin.</p>
    </section>

   <div class="category-scroll" id="categoryBar" style="background-color: rgba(160, 178, 190, 0.13);">

  <button class="category-button" data-category="pasta" data-tr="MAKARNALAR" data-en="PASTA" data-ru="ПАСТА" data-dk="PASTA" data-fi="PASTA" data-se="PASTA" data-no="PASTA" data-nl="PASTA" data-de="PASTA">MAKARNALAR</button>
  <button class="category-button" data-category="pizzas" data-tr="PİZZALAR" data-en="PIZZAS" data-ru="ПИЦЦЫ" data-dk="PIZZAER" data-fi="PIZZAT" data-se="PIZZOR" data-no="PIZZAER" data-nl="PIZZA'S" data-de="PIZZEN">PİZZALAR</button>
  <button class="category-button" data-category="seafood" data-tr="DENİZ ÜRÜNLERİ" data-en="SEAFOOD" data-ru="МОРЕПРОДУКТЫ" data-dk="FISKERETTER" data-fi="MERENELÄVÄTUOTTEET" data-se="SJÖMAT" data-no="SJØMAT" data-nl="ZEEVRUCHTEN" data-de="MEERESFRÜCHTE">DENİZ ÜRÜNLERİ</button>
  <button class="category-button" data-category="desserts" data-tr="TATLILAR" data-en="DESSERTS" data-ru="ДЕСЕРТЫ" data-dk="DESSERTER" data-fi="JÄLKIRUOAT" data-se="EFTERRÄTTER" data-no="DESSERTER" data-nl="DESSERTS" data-de="NACHSPEISEN">TATLILAR</button>
  <button class="category-button" data-category="frozen-drinks" data-tr="BUZLU İÇECEKLER" data-en="FROZEN DRINKS" data-ru="ЗАМОРОЖЕННЫЕ НАПИТКИ" data-dk="ISDRINKS" data-fi="JÄÄJUOMAT" data-se="FRUSNA DRYCKER" data-no="ISDRINKER" data-nl="GEVROREN DRANKEN" data-de="GEFRORENE GETRÄNKE">BUZLU İÇECEKLER</button>

  <button class="category-button" data-category="beer" data-tr="BİRA" data-en="BEER" data-ru="ПИВО" data-dk="ØL" data-fi="OLUT" data-se="ÖL" data-no="ØL" data-nl="BIER" data-de="BIER">BİRA</button>
  <button class="category-button" data-category="whiskeys" data-tr="VİSKİ" data-en="WHISKEYS" data-ru="ВИСКИ" data-dk="WHISKY" data-fi="VISKI" data-se="WHISKY" data-no="WHISKY" data-nl="WHISKY" data-de="WHISKY">VİSKİ</button>
  <button class="category-button" data-category="shots" data-tr="SHOTLAR" data-en="SHOTS" data-ru="ШОТЫ" data-dk="SHOTS" data-fi="SHOTIT" data-se="SHOTS" data-no="SHOTS" data-nl="SHOTS" data-de="SHOTS">SHOT</button>
  <!-- <button class="category-button" data-category="water-pipe" data-tr="nargıle" data-en="WATER PIPE" data-ru="КАЛЬЯН">NARGİLE</button> -->
  <button class="category-button" data-category="milkshakes" data-tr="MİLKSHAKELER" data-en="MILKSHAKES" data-ru="МОЛОЧНЫЕ КОКТЕЙЛИ" data-dk="MILKSHAKES" data-fi="MILKSHAKIT" data-se="MILKSHAKES" data-no="MILKSHAKES" data-nl="MILKSHAKES" data-de="MILKSHAKES">MİLKSHAKELER</button>
  <button class="category-button" data-category="sexycocktails" data-tr="SEXY KOKTEYLLER" data-en="SEXY COCKTAILS" data-ru="СЕКСУАЛЬНЫЕ КОКТЕЙЛИ" data-dk="SEXY COCKTAILS" data-fi="SEXY COCKTAILS" data-se="SEXY COCKTAILS" data-no="SEXY COCKTAILS" data-nl="SEXY COCKTAILS" data-de="SEXY COCKTAILS">SEXY KOKTEYLLER</button>

</div>

    <section style="background-color: rgba(160, 178, 190, 0.13);" class="menu-content">
      <div id="menu-items-display" class="menu-items"></div>
    </section>
  </main>
